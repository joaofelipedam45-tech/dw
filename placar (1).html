<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Placar</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0c10;
      --surface:   #13171f;
      --border:    #1e2530;
      --accent-a:  #00d4ff;
      --accent-b:  #ff4060;
      --gold:      #f5c842;
      --text:      #e8edf5;
      --muted:     #5a6478;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .wrapper { position: relative; z-index: 1; width: 100%; max-width: 860px; }

    header { text-align: center; margin-bottom: 2.5rem; }
    .badge {
      display: inline-block;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid var(--gold);
      padding: .25rem .8rem;
      border-radius: 2px;
      margin-bottom: .8rem;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 10vw, 6rem);
      letter-spacing: .06em;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent-a) 0%, var(--text) 50%, var(--accent-b) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .board {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 1rem;
      align-items: start;
    }

    .team {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.8rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      transition: box-shadow .3s;
    }

    .name-input {
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--border);
      color: var(--text);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: .1em;
      text-align: center;
      width: 100%;
      outline: none;
      padding: .2rem .4rem;
      transition: border-color .25s;
    }
    .name-input::placeholder { color: var(--muted); }

    .score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 14vw, 8rem);
      line-height: 1;
    }
    .score.pop { animation: pop .3s cubic-bezier(.34,1.56,.64,1); }
    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.18); }
      100% { transform: scale(1); }
    }

    .btn-row { display: flex; gap: .6rem; }
    .btn {
      width: 48px; height: 48px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 1.6rem;
      font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .12s, box-shadow .2s;
      user-select: none;
    }
    .btn:active { transform: scale(.92); }

    /* Color picker row */
    .color-row {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-top: -.2rem;
    }
    .color-label {
      font-size: .65rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .color-swatches {
      display: flex;
      gap: .35rem;
    }
    .swatch {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform .15s, border-color .15s;
    }
    .swatch:hover { transform: scale(1.2); }
    .swatch.active { border-color: var(--text); transform: scale(1.15); }

    .color-picker-wrap {
      position: relative;
      width: 22px; height: 22px;
    }
    .color-picker-wrap label {
      display: flex; align-items: center; justify-content: center;
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px dashed var(--muted);
      cursor: pointer;
      font-size: .75rem;
      color: var(--muted);
      transition: border-color .15s, color .15s;
    }
    .color-picker-wrap label:hover { border-color: var(--text); color: var(--text); }
    .color-picker-wrap input[type="color"] {
      position: absolute; inset: 0;
      opacity: 0; width: 100%; height: 100%;
      cursor: pointer;
    }

    .divider {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      padding-top: 3rem;
    }
    .vs { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; color: var(--muted); letter-spacing: .1em; }
    .sep {
      width: 2px; height: 60px;
      background: linear-gradient(to bottom, transparent, var(--border), transparent);
    }

    .timer-wrap { margin-top: 2rem; text-align: center; }
    .timer-label { font-size: .7rem; letter-spacing: .18em; color: var(--muted); text-transform: uppercase; margin-bottom: .4rem; }
    .timer-display { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; letter-spacing: .12em; color: var(--gold); }
    .timer-controls { display: flex; gap: .5rem; justify-content: center; margin-top: .8rem; }
    .tbtn {
      padding: .4rem 1.2rem;
      border-radius: 6px;
      border: 1px solid var(--gold);
      background: transparent;
      color: var(--gold);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    .tbtn:hover { background: var(--gold); color: #000; }

    .winner-banner {
      display: none;
      text-align: center;
      margin-top: 1.5rem;
      padding: .8rem 2rem;
      border-radius: 8px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: .1em;
      animation: fadeIn .4s ease;
    }
    .winner-banner.show { display: block; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

    .reset-row { display: flex; justify-content: center; margin-top: 2rem; }
    .reset-btn {
      padding: .55rem 2rem;
      border-radius: 6px;
      border: 1px solid var(--muted);
      background: transparent;
      color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .reset-btn:hover { border-color: var(--text); color: var(--text); }

    @media (max-width: 560px) {
      .board { grid-template-columns: 1fr; }
      .divider { flex-direction: row; padding-top: 0; }
      .sep { width: 60px; height: 2px; background: linear-gradient(to right, transparent, var(--border), transparent); }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="badge">&#9679; Ao Vivo</div>
    <h1 id="mainTitle">Placar</h1>
  </header>

  <div class="board">

    <!-- TIME A -->
    <div class="team" id="teamCardA">
      <input class="name-input" id="nameA" type="text" maxlength="18" placeholder="TIME A" value="Time A" />
      <div class="score" id="scoreA">0</div>
      <div class="btn-row">
        <button class="btn btn-plus-a"  onclick="change('A',+1)">+</button>
        <button class="btn btn-minus-a" onclick="change('A',-1)">−</button>
      </div>
      <!-- Seletor de cor -->
      <div class="color-row">
        <span class="color-label">Cor</span>
        <div class="color-swatches" id="swatchesA"></div>
        <div class="color-picker-wrap">
          <label title="Cor personalizada">✎
            <input type="color" id="pickerA" value="#00d4ff" oninput="applyColor('A', this.value, null)" />
          </label>
        </div>
      </div>
    </div>

    <div class="divider">
      <div class="sep"></div>
      <div class="vs">VS</div>
      <div class="sep"></div>
    </div>

    <!-- TIME B -->
    <div class="team" id="teamCardB">
      <input class="name-input" id="nameB" type="text" maxlength="18" placeholder="TIME B" value="Time B" />
      <div class="score" id="scoreB">0</div>
      <div class="btn-row">
        <button class="btn btn-plus-b"  onclick="change('B',+1)">+</button>
        <button class="btn btn-minus-b" onclick="change('B',-1)">−</button>
      </div>
      <!-- Seletor de cor -->
      <div class="color-row">
        <span class="color-label">Cor</span>
        <div class="color-swatches" id="swatchesB"></div>
        <div class="color-picker-wrap">
          <label title="Cor personalizada">✎
            <input type="color" id="pickerB" value="#ff4060" oninput="applyColor('B', this.value, null)" />
          </label>
        </div>
      </div>
    </div>

  </div>

  <div class="timer-wrap">
    <div class="timer-label">Cronômetro</div>
    <div class="timer-display" id="timerDisplay">00:00</div>
    <div class="timer-controls">
      <button class="tbtn" onclick="timerStart()">Iniciar</button>
      <button class="tbtn" onclick="timerPause()">Pausar</button>
      <button class="tbtn" onclick="timerReset()">Zerar</button>
    </div>
  </div>

  <div class="winner-banner" id="winnerBanner"></div>

  <div class="reset-row">
    <button class="reset-btn" onclick="resetAll()">&#8635; Reiniciar Placar</button>
  </div>

</div>

<script>
  // ── Paletas predefinidas ──────────────────────────────────────────────
  const PALETTES = {
    A: [
      { color: '#00d4ff', label: 'Ciano'    },
      { color: '#00ff99', label: 'Verde'    },
      { color: '#a78bfa', label: 'Roxo'     },
      { color: '#facc15', label: 'Amarelo'  },
      { color: '#f97316', label: 'Laranja'  },
      { color: '#ffffff', label: 'Branco'   },
    ],
    B: [
      { color: '#ff4060', label: 'Vermelho' },
      { color: '#f97316', label: 'Laranja'  },
      { color: '#a78bfa', label: 'Roxo'     },
      { color: '#00ff99', label: 'Verde'    },
      { color: '#facc15', label: 'Amarelo'  },
      { color: '#ffffff', label: 'Branco'   },
    ],
  };

  // Cores ativas
  const activeColors = { A: '#00d4ff', B: '#ff4060' };

  // ── Monta swatches ────────────────────────────────────────────────────
  function buildSwatches(team) {
    const container = document.getElementById('swatches' + team);
    PALETTES[team].forEach(({ color, label }) => {
      const s = document.createElement('button');
      s.className = 'swatch' + (color === activeColors[team] ? ' active' : '');
      s.style.background = color;
      s.title = label;
      s.addEventListener('click', () => applyColor(team, color, s));
      container.appendChild(s);
    });
  }

  // ── Aplica a cor ao time ──────────────────────────────────────────────
  function applyColor(team, color, clickedSwatch) {
    activeColors[team] = color;

    // Atualiza active nos swatches
    const swatches = document.querySelectorAll('#swatches' + team + ' .swatch');
    swatches.forEach(s => {
      s.classList.toggle('active', s === clickedSwatch);
    });

    // Sincroniza picker
    document.getElementById('picker' + team).value = color;

    const score   = document.getElementById('score'   + team);
    const cardEl  = document.getElementById('teamCard' + team);
    const nameIn  = document.getElementById('name'    + team);
    const plusBtn = document.querySelector('.btn-plus-'  + team.toLowerCase());
    const minBtn  = document.querySelector('.btn-minus-' + team.toLowerCase());
    const glow    = `0 0 24px ${color}55`;

    // Placar
    score.style.color      = color;
    score.style.textShadow = glow;

    // Borda top do card
    cardEl.style.borderTopColor = color;

    // Borda bottom do input no foco
    nameIn.style.setProperty('--focus-color', color);
    nameIn.onfocus = () => { nameIn.style.borderBottomColor = color; };
    nameIn.onblur  = () => { nameIn.style.borderBottomColor = ''; };

    // Botão +
    plusBtn.style.borderColor = color;
    plusBtn.style.color       = color;
    plusBtn.onmouseenter = () => {
      plusBtn.style.background  = color;
      plusBtn.style.color       = isLight(color) ? '#000' : '#fff';
      plusBtn.style.boxShadow   = glow;
    };
    plusBtn.onmouseleave = () => {
      plusBtn.style.background  = '';
      plusBtn.style.color       = color;
      plusBtn.style.boxShadow   = '';
    };

    // Botão −
    minBtn.style.borderColor = '';
    minBtn.style.color       = '';

    // Atualiza gradiente do título
    updateTitleGradient();
  }

  // ── Checa se cor é clara (para contraste no hover) ────────────────────
  function isLight(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return (r*299 + g*587 + b*114) / 1000 > 128;
  }

  // ── Gradiente do H1 acompanha as cores ────────────────────────────────
  function updateTitleGradient() {
    const title = document.getElementById('mainTitle');
    title.style.backgroundImage =
      `linear-gradient(135deg, ${activeColors.A} 0%, #e8edf5 50%, ${activeColors.B} 100%)`;
  }

  // ── Placar ────────────────────────────────────────────────────────────
  const scores = { A: 0, B: 0 };

  function change(team, delta) {
    scores[team] = Math.max(0, scores[team] + delta);
    const el = document.getElementById('score' + team);
    el.textContent = scores[team];
    el.classList.remove('pop');
    void el.offsetWidth;
    el.classList.add('pop');
    checkWinner();
  }

  function checkWinner() {
    const banner = document.getElementById('winnerBanner');
    const nameA  = document.getElementById('nameA').value || 'Time A';
    const nameB  = document.getElementById('nameB').value || 'Time B';
    const diff   = Math.abs(scores.A - scores.B);
    if (diff >= 10) {
      const isA    = scores.A > scores.B;
      const winner = isA ? nameA : nameB;
      const color  = isA ? activeColors.A : activeColors.B;
      banner.textContent    = '🏆 ' + winner + ' está dominando!';
      banner.style.display  = 'block';
      banner.style.border   = `1px solid ${color}`;
      banner.style.color    = color;
      banner.style.background = color + '18';
      banner.classList.add('show');
    } else {
      banner.classList.remove('show');
      banner.style.display = 'none';
    }
  }

  // ── Cronômetro ────────────────────────────────────────────────────────
  let timerInterval = null;
  let timerSeconds  = 0;
  let running       = false;

  function pad(n) { return String(n).padStart(2, '0'); }
  function renderTimer() {
    const m = Math.floor(timerSeconds / 60);
    const s = timerSeconds % 60;
    document.getElementById('timerDisplay').textContent = pad(m) + ':' + pad(s);
  }
  function timerStart() {
    if (running) return;
    running = true;
    timerInterval = setInterval(() => { timerSeconds++; renderTimer(); }, 1000);
  }
  function timerPause() {
    running = false;
    clearInterval(timerInterval);
  }
  function timerReset() {
    timerPause();
    timerSeconds = 0;
    renderTimer();
  }

  function resetAll() {
    scores.A = 0; scores.B = 0;
    document.getElementById('scoreA').textContent = '0';
    document.getElementById('scoreB').textContent = '0';
    document.getElementById('winnerBanner').classList.remove('show');
    document.getElementById('winnerBanner').style.display = 'none';
    timerReset();
  }

  // ── Init ──────────────────────────────────────────────────────────────
  buildSwatches('A');
  buildSwatches('B');
  applyColor('A', '#00d4ff', document.querySelector('#swatchesA .swatch'));
  applyColor('B', '#ff4060', document.querySelector('#swatchesB .swatch'));
</script>
</body>
</html>
